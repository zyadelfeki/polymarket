name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # Job 1: Full unit-test suite (all tests/ except known manual/benches) #
  # ------------------------------------------------------------------ #
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run unit tests
        run: |
          pytest tests/ -x \
            --ignore=tests/integration \
            --ignore=tests/benchmark_event_loop.py \
            --ignore=tests/benchmark_json_serialization.py \
            --ignore=tests/smoke_replay.py \
            --ignore=tests/manual_idempotency_test.py \
            -q --tb=short

  # ------------------------------------------------------------------ #
  # Job 2: Hardening invariants gate — must never regress              #
  #   Runs in parallel with unit-tests to keep wall-clock time low.     #
  #   A red build here means a T1–T4 hardening contract was broken.     #
  # ------------------------------------------------------------------ #
  hardening-invariants:
    name: Hardening Invariants Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run system-invariants unit tests
        run: |
          pytest tests/test_system_invariants.py \
            -v --tb=long

      - name: Run check_session integration tests
        run: |
          pytest tests/test_check_session_invariants.py \
            -v --tb=long
