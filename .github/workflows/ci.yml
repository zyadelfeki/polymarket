name: unit-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run unit tests
        run: |
          pytest tests/ -x \
            --ignore=tests/integration \
            --ignore=tests/benchmark_event_loop.py \
            --ignore=tests/benchmark_json_serialization.py \
            --ignore=tests/smoke_replay.py \
            --ignore=tests/manual_idempotency_test.py \
            -q --tb=short
